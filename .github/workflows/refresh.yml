name: Refresh Dashboard Data

# Runs whenever a new CSV is pushed to raw/, or when manually triggered.
# Also runs daily at 11:00 UTC (7am ET) as a safety net in case the
# Power Automate / Office Script pipeline runs but doesn't trigger an event.
on:
  push:
    paths:
      - 'raw/**.csv'
      - 'scripts/refresh.py'
      - 'scripts/property_reference.csv'
  schedule:
    - cron: '0 11 * * *'  # daily at 11:00 UTC
  workflow_dispatch:       # allow manual runs from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit dashboard_data.json
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run refresh script
        run: python scripts/refresh.py

      - name: Commit updated data
        run: |
          git config user.name "Compliance Watch Bot"
          git config user.email "bot@compliance-watch.local"
          git add data/dashboard_data.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Refresh dashboard data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
